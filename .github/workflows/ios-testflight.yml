name: iOS TestFlight

on:
  push:
    branches:
      - main
    paths:
      - 'ios/**'
      - 'crates/warp_ios_bridge/**'
      - 'scripts/build_ios_xcframework.sh'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version override (CFBundleShortVersionString). Leave empty to use project.pbxproj.'
        required: false
        type: string

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  XCODE_PROJECT: ios/warp-ios/warp-ios.xcodeproj
  SCHEME: warp-ios
  BUNDLE_ID: twingstrom-enterprises.warp-ios.dev
  DEVELOPMENT_TEAM: 88GH3J5VCZ
  ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
  ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

jobs:
  deploy-testflight:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.92.0
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Build Rust iOS bridge
        run: bash scripts/build_ios_xcframework.sh

      - name: Install App Store Connect API key
        id: asc_key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          if [ -z "$APP_STORE_CONNECT_API_KEY" ]; then
            echo "::error::Missing secret APP_STORE_CONNECT_API_KEY"
            exit 1
          fi
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ]; then
            echo "::error::Missing APP_STORE_CONNECT_API_KEY_ID or APP_STORE_CONNECT_API_ISSUER_ID secrets"
            exit 1
          fi
          if printf '%s' "$APP_STORE_CONNECT_API_KEY" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s\n' "$APP_STORE_CONNECT_API_KEY" > "$ASC_KEY_PATH"
          else
            printf '%s' "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$ASC_KEY_PATH"
          fi
          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"
          echo "key<<EOF" >> "$GITHUB_OUTPUT"
          cat "$ASC_KEY_PATH" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning
        uses: apple-actions/download-provisioning-profiles@c0047984c626d0c444c6b6018b92fcbe74eaf7b5 # v4
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ env.ASC_ISSUER_ID }}
          api-key-id: ${{ env.ASC_KEY_ID }}
          api-private-key: ${{ steps.asc_key.outputs.key }}

      - name: Resolve app version
        id: app_version
        env:
          INPUT_MARKETING: ${{ inputs.marketing_version }}
        run: |
          if [ -n "$INPUT_MARKETING" ]; then
            MARKETING_VERSION="$INPUT_MARKETING"
          else
            MARKETING_VERSION=$(awk -F'= *|;' '/MARKETING_VERSION/ {print $2; exit}' ios/warp-ios/warp-ios.xcodeproj/project.pbxproj | tr -d ' ')
          fi
          BUILD_NUMBER="${{ github.run_number }}"
          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "CFBundleShortVersionString (MARKETING_VERSION)=$MARKETING_VERSION"
          echo "CFBundleVersion (CURRENT_PROJECT_VERSION)=$BUILD_NUMBER"

      - name: Resolve provisioning profile
        id: profile
        run: |
          PROFILES='${{ steps.provisioning.outputs.profiles }}'
          PROFILE_UUID=$(echo "$PROFILES" | jq -r '.[0].udid')
          PROFILE_NAME=$(echo "$PROFILES" | jq -r '.[0].name')
          if [ -z "$PROFILE_UUID" ] || [ "$PROFILE_UUID" = "null" ]; then
            echo "::error::Failed to resolve provisioning profile UUID from download step"
            echo "profiles=$PROFILES"
            exit 1
          fi
          echo "uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "Using provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Archive iOS app
        env:
          MARKETING_VERSION: ${{ steps.app_version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.app_version.outputs.build_number }}
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/warp-ios.xcarchive" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Verify archived app version
        env:
          MARKETING_VERSION: ${{ steps.app_version.outputs.marketing_version }}
          BUILD_NUMBER: ${{ steps.app_version.outputs.build_number }}
        run: |
          APP_PLIST="$RUNNER_TEMP/warp-ios.xcarchive/Products/Applications/warp-ios.app/Info.plist"
          ARCHIVED_SHORT=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")
          ARCHIVED_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST")
          echo "Archived CFBundleShortVersionString=$ARCHIVED_SHORT"
          echo "Archived CFBundleVersion=$ARCHIVED_BUILD"
          if [ "$ARCHIVED_SHORT" != "$MARKETING_VERSION" ]; then
            echo "::error::Expected CFBundleShortVersionString=$MARKETING_VERSION but archive has $ARCHIVED_SHORT"
            exit 1
          fi
          if [ "$ARCHIVED_BUILD" != "$BUILD_NUMBER" ]; then
            echo "::error::Expected CFBundleVersion=$BUILD_NUMBER but archive has $ARCHIVED_BUILD"
            exit 1
          fi

      - name: Export IPA
        env:
          PROFILE_UUID: ${{ steps.profile.outputs.uuid }}
        run: |
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cp ios/ExportOptions.plist "$EXPORT_OPTIONS"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" "$EXPORT_OPTIONS" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_UUID" "$EXPORT_OPTIONS" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:$BUNDLE_ID $PROFILE_UUID" "$EXPORT_OPTIONS"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/warp-ios.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@e15af57a639abb7e91f0651338f0ff4154cdaf5e # v4
        with:
          app-path: ${{ runner.temp }}/export/warp-ios.ipa
          app-type: ios
          issuer-id: ${{ env.ASC_ISSUER_ID }}
          api-key-id: ${{ env.ASC_KEY_ID }}
          api-private-key: ${{ steps.asc_key.outputs.key }}
          release-notes: 'v${{ steps.app_version.outputs.marketing_version }} (${{ steps.app_version.outputs.build_number }}) — ${{ github.sha }}'
